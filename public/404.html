<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Ivan Galaviz</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link
      href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@variable&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "JetBrains Mono", "Fira Code", monospace;
        background: #06080C;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      /* Grain overlay */
      .grain {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        opacity: 0.03;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        z-index: 1000;
      }

      /* Ambient glow */
      .glow {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
      }

      .glow-1 {
        width: 500px;
        height: 500px;
        top: 20%;
        left: 30%;
        transform: translate(-50%, -50%);
        background: radial-gradient(
          circle,
          rgba(37, 99, 235, 0.1) 0%,
          rgba(37, 99, 235, 0.03) 40%,
          transparent 70%
        );
        animation: float-slow 25s ease-in-out infinite;
      }

      .glow-2 {
        width: 350px;
        height: 350px;
        bottom: 15%;
        right: 20%;
        background: radial-gradient(
          circle,
          rgba(245, 240, 232, 0.05) 0%,
          rgba(245, 240, 232, 0.015) 40%,
          transparent 70%
        );
        animation: float-reverse 30s ease-in-out infinite;
      }

      /* Content container */
      .container {
        text-align: center;
        position: relative;
        z-index: 1;
      }

      /* 404 display text */
      .error-code {
        font-family: "Cabinet Grotesk", system-ui, sans-serif;
        font-size: clamp(8rem, 20vw, 16rem);
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.04em;
        background: linear-gradient(
          135deg,
          #F5F0E8 0%,
          #2563EB 50%,
          #1E40AF 100%
        );
        background-size: 200% 200%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: gradient-shift 8s ease-in-out infinite;
        margin-bottom: 1rem;
      }

      /* Subtitle */
      .subtitle {
        font-family: "JetBrains Mono", monospace;
        font-size: clamp(0.875rem, 1.5vw, 1.125rem);
        color: #94A3B8;
        margin-bottom: 2.5rem;
        letter-spacing: 0.02em;
      }

      /* Back to home button */
      .back-link {
        display: inline-block;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.875rem;
        color: #ffffff;
        background: #2563EB;
        text-decoration: none;
        padding: 0.75rem 2rem;
        border-radius: 0.5rem;
        letter-spacing: 0.02em;
        transition: background 0.25s cubic-bezier(0.25, 1, 0.5, 1),
                    box-shadow 0.25s cubic-bezier(0.25, 1, 0.5, 1),
                    transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
      }

      .back-link:hover {
        background: #1D4ED8;
        box-shadow: 0 0 40px rgba(37, 99, 235, 0.25);
        transform: translateY(-1px);
      }

      .back-link:active {
        transform: translateY(0);
      }

      /* Animations */
      @keyframes gradient-shift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }

      @keyframes float-slow {
        0%, 100% { transform: translate(-50%, -50%) scale(1); }
        25% { transform: translate(calc(-50% + 30px), calc(-50% - 40px)) scale(1.05); }
        50% { transform: translate(calc(-50% - 20px), calc(-50% - 60px)) scale(0.98); }
        75% { transform: translate(calc(-50% - 40px), calc(-50% - 25px)) scale(1.02); }
      }

      @keyframes float-reverse {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(-50px, 30px) scale(1.1); }
        66% { transform: translate(40px, -20px) scale(0.95); }
      }

      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .container {
        animation: fade-in-up 0.8s ease-out forwards;
      }
    </style>
  </head>
  <body>
    <div class="grain"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="container">
      <h1 class="error-code">404</h1>
      <p class="subtitle">Page not found</p>
      <a href="/" class="back-link">Back to home</a>
    </div>
  </body>
</html>
