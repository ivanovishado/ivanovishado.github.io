<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Ivan Galaviz</title>
    <meta name="theme-color" content="#090a0c" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "JetBrains Mono", monospace;
        background: #090a0c; color: #ece4d2;
        min-height: 100vh; display: grid; place-items: center;
        overflow: hidden; position: relative; padding: 2rem;
      }
      .grain { position: fixed; inset: 0; pointer-events: none; opacity: 0.05; mix-blend-mode: overlay;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
      .orbit { position: fixed; top: 50%; left: 50%; width: 70vmin; height: 70vmin; transform: translate(-50%,-50%); opacity: 0.25; }
      .container { text-align: center; position: relative; z-index: 1; }
      .eyebrow { font-size: 0.7rem; letter-spacing: 0.28em; text-transform: uppercase; color: #e8b04b; margin-bottom: 1.5rem; }
      .code { font-family: "Fraunces", serif; font-weight: 360; font-variation-settings: "opsz" 144;
        font-size: clamp(7rem, 26vw, 18rem); line-height: 0.86; letter-spacing: -0.04em; }
      .code em { font-style: italic; color: #e8b04b; }
      .sub { font-size: 0.85rem; color: rgba(236,228,210,0.6); margin: 1.5rem 0 2.5rem; letter-spacing: 0.04em; }
      .back { font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: #090a0c;
        background: #e8b04b; padding: 0.85rem 1.6rem; border-radius: 999px; text-decoration: none;
        transition: transform .3s cubic-bezier(.25,1,.5,1), box-shadow .3s; }
      .back:hover { transform: translateY(-2px); box-shadow: 0 10px 36px rgba(232,176,75,0.32); }
    </style>
  </head>
  <body>
    <div class="grain"></div>
    <svg class="orbit" viewBox="0 0 100 100" fill="none" aria-hidden="true">
      <ellipse cx="50" cy="50" rx="46" ry="30" stroke="#ece4d2" stroke-width="0.3" opacity="0.5"/>
      <ellipse cx="50" cy="50" rx="34" ry="20" stroke="#ece4d2" stroke-width="0.3" opacity="0.7" transform="rotate(28 50 50)"/>
      <circle cx="50" cy="50" r="2" fill="#e8b04b"/>
      <circle cx="92" cy="44" r="1.4" fill="#ece4d2"/>
    </svg>
    <div class="container">
      <p class="eyebrow">Off the map</p>
      <h1 class="code">4<em>0</em>4</h1>
      <p class="sub">This page drifted out of orbit.</p>
      <a href="/" class="back">Back to field notes</a>
    </div>
  </body>
</html>
